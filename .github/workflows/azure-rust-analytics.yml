name: Deploy Rust Analytics To Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/azure-rust-analytics.yml"
      - "services/rust-analytics/**"
      - "server/index.js"
      - "server/services/localAnalyticsFallback.js"
      - "server/services/rustAnalyticsClient.js"
      - "DEPLOYMENT.md"
      - "env.example"
      - ".env.example"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RUST_SERVICE_PATH: services/rust-analytics
  CONTAINER_PORT: "8081"

jobs:
  deploy-rust-analytics:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Azure Container Apps CLI support
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az extension add --name containerapp --upgrade

      - name: Build and deploy Rust image
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}/services/rust-analytics
          dockerfilePath: ${{ github.workspace }}/services/rust-analytics/Dockerfile
          acrName: ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}
          acrUsername: ${{ secrets.AZURE_ACR_USERNAME }}
          acrPassword: ${{ secrets.AZURE_ACR_PASSWORD }}
          containerAppName: ${{ vars.AZURE_CONTAINER_APP_NAME }}
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          imageToBuild: ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}.azurecr.io/${{ vars.AZURE_RUST_IMAGE_REPOSITORY }}:${{ github.sha }}

      - name: Configure ingress, secrets, and runtime settings
        uses: azure/CLI@v2
        env:
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME }}
          CONTAINER_PORT: ${{ env.CONTAINER_PORT }}
          MONGODB_DB_NAME: ${{ vars.RUST_ANALYTICS_MONGODB_DB_NAME }}
          MONGODB_COLLECTION: ${{ vars.RUST_ANALYTICS_MONGODB_COLLECTION }}
          MONGODB_STATE_DOC_ID: ${{ vars.RUST_ANALYTICS_MONGODB_STATE_DOC_ID }}
          SNAPSHOT_COLLECTION: ${{ vars.RUST_ANALYTICS_SNAPSHOT_COLLECTION }}
          ETL_ENABLED: ${{ vars.RUST_ANALYTICS_ETL_ENABLED }}
          ETL_INTERVAL_SECS: ${{ vars.RUST_ANALYTICS_ETL_INTERVAL_SECS }}
          ETL_RETENTION_DAYS: ${{ vars.RUST_ANALYTICS_ETL_RETENTION_DAYS }}
          RECENT_ACTIVITY_LIMIT: ${{ vars.RUST_ANALYTICS_RECENT_ACTIVITY_LIMIT }}
          LOGIN_SERIES_DAYS: ${{ vars.RUST_ANALYTICS_LOGIN_SERIES_DAYS }}
          MONGO_MAX_POOL_SIZE: ${{ vars.RUST_ANALYTICS_MONGO_MAX_POOL_SIZE }}
          MIN_REPLICAS: ${{ vars.AZURE_CONTAINER_APP_MIN_REPLICAS }}
          MAX_REPLICAS: ${{ vars.AZURE_CONTAINER_APP_MAX_REPLICAS }}
          MONGODB_URI_SECRET: ${{ secrets.RUST_ANALYTICS_MONGODB_URI }}
          ANALYTICS_TOKEN_SECRET: ${{ secrets.RUST_ANALYTICS_TOKEN }}
        with:
          inlineScript: |
            set -euo pipefail

            az extension add --name containerapp --upgrade

            MONGODB_DB_NAME="${MONGODB_DB_NAME:-whitleos}"
            MONGODB_COLLECTION="${MONGODB_COLLECTION:-appState}"
            MONGODB_STATE_DOC_ID="${MONGODB_STATE_DOC_ID:-whitleos-state-v1}"
            SNAPSHOT_COLLECTION="${SNAPSHOT_COLLECTION:-analyticsSnapshots}"
            ETL_ENABLED="${ETL_ENABLED:-true}"
            ETL_INTERVAL_SECS="${ETL_INTERVAL_SECS:-300}"
            ETL_RETENTION_DAYS="${ETL_RETENTION_DAYS:-30}"
            RECENT_ACTIVITY_LIMIT="${RECENT_ACTIVITY_LIMIT:-20}"
            LOGIN_SERIES_DAYS="${LOGIN_SERIES_DAYS:-14}"
            MONGO_MAX_POOL_SIZE="${MONGO_MAX_POOL_SIZE:-20}"
            MIN_REPLICAS="${MIN_REPLICAS:-1}"
            MAX_REPLICAS="${MAX_REPLICAS:-3}"

            az containerapp ingress enable \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --type external \
              --target-port "$CONTAINER_PORT" \
              --transport auto

            az containerapp secret set \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --secrets \
                mongodb-uri="$MONGODB_URI_SECRET" \
                analytics-token="$ANALYTICS_TOKEN_SECRET"

            az containerapp update \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --min-replicas "$MIN_REPLICAS" \
              --max-replicas "$MAX_REPLICAS" \
              --set-env-vars \
                RUST_ANALYTICS_HOST=0.0.0.0 \
                RUST_ANALYTICS_PORT="$CONTAINER_PORT" \
                RUST_ANALYTICS_TOKEN=secretref:analytics-token \
                RUST_ANALYTICS_RECENT_ACTIVITY_LIMIT="$RECENT_ACTIVITY_LIMIT" \
                RUST_ANALYTICS_LOGIN_SERIES_DAYS="$LOGIN_SERIES_DAYS" \
                RUST_ANALYTICS_MONGO_MAX_POOL_SIZE="$MONGO_MAX_POOL_SIZE" \
                RUST_ANALYTICS_ETL_ENABLED="$ETL_ENABLED" \
                RUST_ANALYTICS_ETL_INTERVAL_SECS="$ETL_INTERVAL_SECS" \
                RUST_ANALYTICS_ETL_RETENTION_DAYS="$ETL_RETENTION_DAYS" \
                RUST_ANALYTICS_SNAPSHOT_COLLECTION="$SNAPSHOT_COLLECTION" \
                MONGODB_URI=secretref:mongodb-uri \
                MONGODB_DB_NAME="$MONGODB_DB_NAME" \
                MONGODB_COLLECTION="$MONGODB_COLLECTION" \
                MONGODB_STATE_DOC_ID="$MONGODB_STATE_DOC_ID"

      - name: Print deployed Rust analytics URL
        uses: azure/CLI@v2
        env:
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME }}
        with:
          inlineScript: |
            az containerapp show \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query properties.configuration.ingress.fqdn \
              -o tsv
